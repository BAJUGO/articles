global:
  scrape_interval: 30s

scrape_configs:
  - job_name: 'postgres'
    static_configs:
        - targets: ['db_exporter:9187']


  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: 'fastapi-app'
    scrape_interval: 15s
    static_configs:
      - targets: ['backend:8000']

