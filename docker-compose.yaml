services:
  backend:
    build: ./backend
    image: my_backend_build

    depends_on:
      db:
        condition: service_healthy
# ЕБАНУТЫЙ УЁБОК БЛЯДЬ ЕЩЁ БЫ ЧАС СИДЕЛ ЗА ЭТОЙ ХУЙНЁЙ СЦУКА НАХУЙ БЛЯДЬ ПИШИ DEPENDS ГДЕ НУЖНО ДЕГЕНЕРАТ

    ports:
      - "8000:8000"
    container_name: my_backend_container
    env_file:
      - .env
    environment:
      DB_URL: ${DB_URL}
      ECHO: ${ECHO}
    networks:
      articles_network:


  db:
    image: postgres:18
    container_name: db_container
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      articles_network:
    volumes:
      - db-data:/var/lib/postgresql


volumes:
  db-data:

networks:
  articles_network: