<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Articles</title>
<style>
body { background:#f8f9fa; font-family: Arial; }
.container { padding:40px; }
.row { display:flex; gap:15px; }
.col { flex:1; }
.card { background:#fff; border-radius:12px; box-shadow:0 4px 12px rgba(0,0,0,.08); padding:15px; height:100%; }
.center { display:flex; align-items:center; justify-content:center; }
button { white-space:nowrap; }
ul { background:#fff; min-height:120px; border-radius:10px; padding:10px; }
</style>
</head>

<body>

<button id="unlogin">Unlogin</button>

<div class="container">
    <div style="text-align:center; margin-bottom:20px;">
        <h3>Articles control panel</h3>
    </div>


<div class="row">

    <!-- Article by ID -->
    <div class="col">
        <div class="card">
            <form id="form_article_by_id" style="display:flex; gap:10px;">
                <input id="article_id" type="text" placeholder="Article ID" style="flex:1;">
                <button>Get</button>
            </form>
        </div>
    </div>

    <!-- All articles -->
    <div class="col">
        <div class="card center">
            <form id="form_all_articles">
                <button>All articles</button>
            </form>
        </div>
    </div>

    <!-- Articles of user -->
    <div class="col">
        <div class="card">
            <form id="form_articles_by_user" style="display:flex; gap:10px;">
                <input id="user_id" type="text" placeholder="User ID" style="flex:1;">
                <button>By user</button>

            </form>
        </div>
    </div>

    <!-- All articles with authors -->
    <div class="col">
        <div class="card center">
            <button>All + authors</button>
        </div>
    </div>

</div>


</div>

<div class="container">
    <div class="row">
        <button class="col" onclick="document.getElementById('ul_1').innerHTML=''">Clear</button>
        <button class="col" onclick="document.getElementById('ul_2').innerHTML=''">Clear</button>
        <button class="col" onclick="document.getElementById('ul_3').innerHTML=''">Clear</button>
        <button class="col" onclick="document.getElementById('ul_4').innerHTML=''">Clear</button>
    </div>
</div>


<div class="container">
    <div class="row">
        <ul id="ul_1" class="col"></ul>
        <ul id="ul_2" class="col"></ul>
        <ul id="ul_3" class="col"></ul>
        <ul id="ul_4" class="col"></ul>
    </div>
</div>

<script type="module" src="../html_scripts/articles_getter.js"></script>

<script type="module">
import {includeUnlogin} from "../html_scripts/funcs.js";
includeUnlogin()
</script>

</body>
</html>
